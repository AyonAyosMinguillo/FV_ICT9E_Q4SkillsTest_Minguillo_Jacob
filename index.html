<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Skills Test</title>
    <link rel="icon" type="image/png" href="OBMC.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sen:wght@400..800&display=swap" rel="stylesheet">

<style>
body {
margin: 0;
background-image: url("obmcbg.png");
background-size: cover;
 background-position: center;
height: 100vh;  
display: flex;
justify-content: center;
align-items: center;
font-family: 'Sen', sans-serif;
        }
.box {
            
            border-radius: 16px;
            width: 400px;
            padding: 40px;
            border: 4px solid #cbd0d8;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.6);
            background: rgba(39, 115, 165, 0.08);
            backdrop-filter: blur(8px);
        }
        .btn-custom {
            background: #ffffff;
            color: #000000;
            font-weight: 600;
            border: none;
        }
        .btn-custom:hover {
            background: #d9d9d9;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
        a {
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        h2 {
            font-weight: 700;
            color: #1f377a;
        }
    </style>
</head>
<body>

<div class="box text-center">
<h2 class="mb-3">OB MONTESSORI</h2>
<input type="text" id="username" class="form-control mb-2" placeholder="Username">
<input type="password" id="password" class="form-control mb-2" placeholder="Password">

<div class="d-flex justify-content-between align-items-center mb-3">
<div class="form-check">
    <input class="form-check-input" type="checkbox">
    <label class="form-check-label">Stay logged in</label>
</div>
    <a href="#" onclick="forgotPassword()">Forgot password?</a>
</div>
    <button id="loginBtn" class="btn btn-custom w-50" onclick="login()" >Login</button>
    <button id="resetBtn" class="btn btn-custom w-50 mt-2" onclick="resetAttempts()" style="display: none;">Reset Attempts</button>

    <h4 id="result"></h4>

</div>

<script>
let attempt_counter = 0;

function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let correctUser = "104067670";
    let correctPass = "104067670-Blackie";

    if (username === correctUser && password === correctPass) {
        document.getElementById("result").innerHTML = "Hello " + username + ", you have successfully logged in!";
        window.alert("Hello " + username + ", you have successfully logged in!");
        attempt_counter = 0;
        window.location.href = "notebooks.html";
    } else {
        attempt_counter++;
        if (attempt_counter >= 3) {
            document.getElementById("result").innerHTML = "Access denied. Account locked after 3 attempts!";
            window.alert("Access denied. Account locked after 3 attempts!");
            document.getElementById("loginBtn").disabled = true;
            document.getElementById("resetBtn").style.display = "block";
        } else {
            document.getElementById("result").innerHTML = "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";
            window.alert("The Password is incorrect. Please try again.");
        }
    }
}

function forgotPassword() {
    alert("Try ID Number 104067670 and password is 104067670-Blackie");
}

function resetAttempts() {
    attempt_counter = 0;
    document.getElementById("loginBtn").disabled = false;
    document.getElementById("resetBtn").style.display = "none";
    document.getElementById("result").innerHTML = "";
}
</script>

</body>
</html>
